name: qorhealth
description: QoreHealth - Health & Nutrition Tracking App
publish_to: "none"
version: 5.9.0+7

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  dio: ^5.4.3
  url_launcher: ^6.2.5

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1


  # Icon library (4,700+ icons with theme support)
  hugeicons: ^1.1.5

  # Charts
  fl_chart: ^0.68.0

  # File picking (PDF/CSV uploads)
  file_picker: ^8.0.0

  # Image picking & camera
  image_picker: ^1.0.7
  image_cropper: ^11.0.0

  # Barcode scanning
  mobile_scanner: ^5.1.1

  # Date/time formatting
  intl: ^0.19.0

  # Cached images
  cached_network_image: ^3.3.1

  # Location (environment auto-capture)
  geolocator: ^12.0.0

  # Non-sensitive settings
  shared_preferences: ^2.2.3

  # Secure credential storage (Android Keystore AES-256 / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Biometric authentication (fingerprint / Face ID)
  local_auth: ^2.3.0

  # Local push notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # PDF generation + printing/sharing
  pdf: ^3.11.0
  printing: ^5.13.1

  # Icons
  cupertino_icons: ^1.0.6

  # Google Fonts (Plus Jakarta Sans)
  google_fonts: ^6.2.1

  # Share & gallery save (share cards)
  share_plus: ^10.1.4
  gal: ^2.3.0

  # Speech-to-text (voice meal logging)
  speech_to_text: ^7.0.0
  flutter_timezone: ^5.0.1
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_analytics: ^12.1.3
  firebase_messaging: ^16.1.2

  path_provider: any
  quick_actions: ^1.1.0

  # Wearable / Health platform sync
  health: ^12.0.0
  workmanager: ^0.5.2

  # XML streaming parser (Apple Health export)
  xml: ^6.5.0
  # CSV parser (MFP / Cronometer imports)
  csv: ^6.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/qorhealth_app_icon.png"
  adaptive_icon_foreground: "assets/qorhealth_app_icon.png"
  adaptive_icon_background: "#000000"

flutter:
  uses-material-design: true

  assets:
    - assets/
