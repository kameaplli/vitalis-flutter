name: vitalis
description: Vitalis - Health & Nutrition Tracking App
publish_to: "none"
version: 3.5.0+2

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP & networking
  dio: ^5.4.3

  # Navigation
  go_router: ^13.2.0

  # State management
  flutter_riverpod: ^2.5.1


  # Charts
  fl_chart: ^0.68.0

  # File picking (PDF/CSV uploads)
  file_picker: ^8.0.0

  # Image picking & camera
  image_picker: ^1.0.7
  image_cropper: ^11.0.0

  # Barcode scanning
  mobile_scanner: ^5.1.1

  # Date/time formatting
  intl: ^0.19.0

  # Cached images
  cached_network_image: ^3.3.1

  # Location (environment auto-capture)
  geolocator: ^12.0.0

  # Non-sensitive settings
  shared_preferences: ^2.2.3

  # Secure credential storage (Android Keystore AES-256 / iOS Keychain)
  flutter_secure_storage: ^9.2.2

  # Biometric authentication (fingerprint / Face ID)
  local_auth: ^2.3.0

  # Local push notifications
  flutter_local_notifications: ^17.2.3
  timezone: ^0.9.4

  # Shimmer skeleton loading
  shimmer: ^3.0.0

  # SVG rendering
  flutter_svg: ^2.0.10+1

  # PDF generation + printing/sharing
  pdf: ^3.11.0
  printing: ^5.13.1

  # Icons
  cupertino_icons: ^1.0.6

  # Google Fonts (Plus Jakarta Sans)
  google_fonts: ^6.2.1

  # Speech-to-text (voice meal logging)
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
