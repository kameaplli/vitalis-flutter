<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A7F64"/>
      <stop offset="100%" style="stop-color:#0D5E4A"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ADE80"/>
      <stop offset="100%" style="stop-color:#22C55E"/>
    </linearGradient>
    <linearGradient id="pulse" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#D1FAE5"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Inner shadow/glow -->
  <rect x="16" y="16" width="480" height="480" rx="96" fill="none" stroke="#2DD4BF" stroke-width="2" opacity="0.3"/>
  <!-- Leaf shape (health/vitality) -->
  <path d="M256 100 C180 140, 120 220, 140 320 C160 380, 220 400, 256 380 C292 400, 352 380, 372 320 C392 220, 332 140, 256 100Z" fill="url(#leaf)" opacity="0.25"/>
  <!-- Heartbeat / pulse line -->
  <polyline points="100,280 170,280 195,280 215,220 235,340 255,200 275,360 295,240 315,280 340,280 412,280" fill="none" stroke="url(#pulse)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- V letterform -->
  <path d="M176 140 L256 310 L336 140" fill="none" stroke="#FFFFFF" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Small leaf accent on the V -->
  <path d="M336 140 C345 120, 365 108, 380 115 C370 125, 350 135, 336 140Z" fill="#4ADE80"/>
  <!-- Subtle circle ring -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#FFFFFF" stroke-width="3" opacity="0.15"/>
</svg>
